name: CI/CD Tienda Perritos EKS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Esto te permite ejecutar el pipeline a mano desde GitHub por si lo necesitas

jobs:
  build-and-deploy:
    name: Build and Deploy to EKS
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar el código del repositorio
      uses: actions/checkout@v3

    - name: 2. Configurar credenciales de AWS Academy
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Crítico para cuentas de estudiante
        aws-region: ${{ secrets.AWS_REGION }}

    - name: 3. Iniciar sesión en Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: 4. Construir, etiquetar y subir imágenes a ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: eks-v1 # Mantengo la misma etiqueta que usaste en tu actividad anterior
      run: |
        echo "Construyendo y subiendo Backend..."
        docker build -t $ECR_REGISTRY/tienda-backend:$IMAGE_TAG ./backend
        docker push $ECR_REGISTRY/tienda-backend:$IMAGE_TAG
        
        echo "Construyendo y subiendo Frontend..."
        docker build -t $ECR_REGISTRY/tienda-frontend:$IMAGE_TAG ./frontend
        docker push $ECR_REGISTRY/tienda-frontend:$IMAGE_TAG
        
        echo "Construyendo y subiendo Base de Datos..."
        docker build -t $ECR_REGISTRY/tienda-db:$IMAGE_TAG ./db
        docker push $ECR_REGISTRY/tienda-db:$IMAGE_TAG

    - name: 5. Conectar GitHub Actions al Clúster EKS
      run: |
        aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER_NAME }}

    - name: 6. Desplegar manifiestos en Kubernetes
      run: |
        cd k8s
        
        # Aplicar el Namespace primero
        kubectl apply -f namespace.yaml
        
        # Aplicar Base de datos
        kubectl apply -f mysql-secret.yaml
        kubectl apply -f mysql-deployment.yaml
        kubectl apply -f mysql-service.yaml
        
        # Aplicar Backend
        kubectl apply -f backend-deployment.yaml
        kubectl apply -f backend-service.yaml
        
        # Aplicar Frontend
        kubectl apply -f frontend-deployment.yaml
        kubectl apply -f frontend-service.yaml

    - name: 7. Forzar actualización de los Pods
      # Esto asegura que Kubernetes descargue la nueva imagen que acabamos de subir en el paso 4
      run: |
        kubectl rollout restart deployment tienda-backend -n ${{ secrets.EKS_NAMESPACE }}
        kubectl rollout restart deployment tienda-frontend -n ${{ secrets.EKS_NAMESPACE }}